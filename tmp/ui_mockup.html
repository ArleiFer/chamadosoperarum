<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup Operarum - Materiais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; padding: 2rem; }
        .operarum-bg { background-color: #00311c; }
        .operarum-text { color: #00311c; }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-sm border border-slate-200 overflow-hidden">
        <!-- Header Mockup -->
        <div class="border-b border-slate-200 p-6 bg-slate-50">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-bold operarum-text uppercase tracking-[0.1em]">#OP-000123 - Troca de Lâmpadas LED</h1>
                    <p class="text-sm text-slate-500 mt-1">Status: <span class="font-bold text-orange-600 uppercase">Aguardando Peças</span></p>
                </div>
            </div>
        </div>

        <!-- Description Mockup -->
        <div class="p-6 border-b border-slate-200">
            <h3 class="text-sm font-medium text-slate-900 mb-2">Descrição do Problema</h3>
            <p class="text-slate-700 text-sm">Solicito a troca de 10 lâmpadas LED no corredor principal do Bloco A.</p>
        </div>

        <!-- NEW COMPONENT: Materiais e Ferramentas -->
        <div class="p-6 border-b border-slate-200 bg-slate-50/50">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold text-slate-900 uppercase tracking-widest flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 mr-2 operarum-text"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1 2.83 0l.3.3a2 2 0 0 1 0 2.83l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1 2.83 0l.3.3a2 2 0 0 1 0 2.83l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1 2.83 0l.3.3a2 2 0 0 1 0 2.83l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1 2.83 0l.3.3a2 2 0 0 1 0 2.83l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1 2.83 0l.3.3a2 2 0 0 1 0 2.83l-3.77 3.77a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1 2.83 0l.3.3a1 1 0 0 1 0 1.41z"/><path d="m2 22 5-5"/><path d="M9.5 14.5 16 21"/><path d="n10 10 5 5"/><path d="m3.5 11.5 6 6"/><path d="M10 10 3 3"/></svg>
                    Materiais e Ferramentas
                </h3>
                <button class="text-[10px] font-black text-white operarum-bg px-3 py-1.5 rounded-sm shadow-sm uppercase tracking-widest">
                    Salvar Lista
                </button>
            </div>
            
            <textarea
                class="w-full rounded-sm border-slate-300 shadow-sm text-sm p-4 border bg-white h-32"
                placeholder="Liste aqui os materiais..."
            >10x Lâmpadas LED 12W E27
1x Escada articulada 4m
1x Chave de fenda Philips
Fita isolante 3M</textarea>
        </div>

        <!-- Sidebar Filter Mockup -->
        <div class="p-6">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Sidebar / Filtros</p>
            <div class="flex items-center space-x-2 text-sm font-medium p-2 bg-orange-50 text-orange-700 rounded-sm border border-orange-100">
                <span class="w-2 h-2 rounded-full bg-orange-500"></span>
                <span>Aguardando Peças</span>
                <span class="ml-auto bg-orange-200 text-orange-800 px-2 py-0.5 rounded-full text-[10px]">3</span>
            </div>
        </div>
    </div>
</body>
</html>
